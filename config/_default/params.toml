colorScheme = "slate"             # mais neutro, imagens se destacam mais
defaultAppearance = "dark"
autoSwitchAppearance = true       # respeita preferência do sistema do leitor

showAuthor = true
showBreadcrumbs = true
showDate = true
showReadingTime = true
showTableOfContents = true
showSummary = true
showTaxonomies = true

[homepage]
  layout = "profile"
  showRecent = true
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "/posts"     # mais neutro enquanto o blog está nascendo
  cardView = true
  cardViewScreenWidth = false

[article]
  showDate = true
  showAuthor = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  showEdit = false                # evita expor a URL do repo publicamente