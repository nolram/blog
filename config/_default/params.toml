colorScheme = "slate"             # mais neutro, imagens se destacam mais
defaultAppearance = "dark"
autoSwitchAppearance = true       # respeita preferência do sistema do leitor
defaultSocialImage = "img/social-default.jpg"
robots = "index, follow"
mainSections = ["astrophotography", "tech", "misc"]
enableStructuredBreadcrumbs = true

showAuthor = true
showBreadcrumbs = true
showDate = true
showReadingTime = true
showTableOfContents = true
showSummary = true
showTaxonomies = true

[homepage]
  layout = "profile"
  showRecent = true
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "/posts"     # mais neutro enquanto o blog está nascendo
  cardView = true
  cardViewScreenWidth = false

[footer]
  copyright = "© 2026 Marlon Baptista Quadros. Text under [CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/). Images under [CC BY-NC-ND 4.0](https://creativecommons.org/licenses/by-nc-nd/4.0/)."

[article]
  showDate = true
  showAuthor = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  showEdit = false                # evita expor a URL do repo publicamente